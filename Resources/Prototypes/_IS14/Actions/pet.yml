- type: entity
  parent: BaseAction
  id: ActionPetStay
  name: Stay
  description: Order to stay
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: _IS14/Interface/Actions/actions_pet.rsi
      state: stayOff
    iconOn:
      sprite: _IS14/Interface/Actions/actions_pet.rsi
      state: stay
    priority: 5
  - type: InstantAction
    event: !type:PetOrderActionEvent
      type: Stay

