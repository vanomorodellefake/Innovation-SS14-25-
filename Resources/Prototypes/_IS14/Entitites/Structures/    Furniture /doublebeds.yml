- type: entity
  name: Bed double up
  id: IS14BedDoubleUp
  parent: BaseStructure
  description: This is used to lie in, sleep in or strap on. Resting here provides extremely slow healing.
  components:
  - type: HealOnBuckle
    damage:
      types:
        Poison: -0.5
        Blunt: -0.2
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.55"
        density: 190
        mask:
        - TableMask
  - type: Sprite
    sprite: _IS14/Structures/Furniture/DoubleBed.rsi
    state: doublebed_up
    noRot: true
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: "0,0.20"
#  - type: Construction TODO
#    graph: LPPBedDouble
#    node: LPPBedDoubleUp
  - type: PlaceableSurface
    placeCentered: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
  - type: Transform
    anchored: true
    noRot: true
  - type: Anchorable
  - type: Pullable

- type: entity
  parent: IS14BedDoubleUp
  id: IS14BedDoubleDown
  name: bed double down
  description: Better sleep in that then on the floor i guess.
  components:
#  - type: Construction TODO x2
#    graph: LPPBedDouble
#    node: LPPBedDoubleDown
  - type: Sprite
    state: doublebed_down
  - type: Damageable
    damageModifierSet: Inflatable
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: "0,-0.1"