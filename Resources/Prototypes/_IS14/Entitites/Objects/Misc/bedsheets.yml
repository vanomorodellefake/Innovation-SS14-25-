#base ent

- type: entity
  parent: BaseItem
  id: IS14DoubleBedsheetBase
  name: DoubleBedsheetBase
  abstract: true
  description: A surprisingly soft linen bedsheet.
  placement:
    mode: SnapgridCenter
    snap:
    - Bed
  components:
  - type: Sprite
    sprite: _IS14/Objects/Misc/doublebedsheets.rsi
    noRot: true
  - type: Item
    size: Small
  - type: StaticPrice
    price: 150
  - type: Tag
    tags:
    - Bedsheet


