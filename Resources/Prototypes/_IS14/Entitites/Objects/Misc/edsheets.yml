#base ent

- type: entity
  parent: BaseItem
  id: IS14DoubleBedsheetBase
  name: DoubleBedsheetBase
  abstract: true
  description: A surprisingly soft linen bedsheet.
  placement:
    mode: SnapgridCenter
    snap:
    - Bed
  components:
