- type: entity
  name: bunk bed (upper berth)
  id: IS14BedDoubleUp
  parent: BaseStructure
  description: Top bunk of a two-tier bed. Resting here provides extremely slow healing. Needs a bunk mattress before anyone can lie on it.
  components:
  - type: HealOnBuckle
    damage:
      types:
        Poison: -0.5
        Blunt: -0.2
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.55"
        density: 190
        mask:
        - TableMask
  - type: Sprite
    sprite: _IS14/Structures/Furniture/DoubleBed.rsi
    state: doublebed_up
    noRot: true
    # Well above lower berth + buckled mob (client sets mob to strapDepth±1).
    drawdepth: LargeObjects
  - type: InteractionOutline
  - type: Strap
    enabled: false
    position: Down
    rotation: -90
    buckleOffset: "0,0.20"
  - type: ItemSlots
    slots:
      mattress_slot:
        name: is14-bunk-mattress-slot-name
        insertSound:
          path: /Audio/Items/belt_equip.ogg
        ejectSound:
          path: /Audio/Items/belt_equip.ogg
        whitelist:
          tags:
          - IS14BunkMattress
  - type: ContainerContainer
    containers:
      mattress_slot: !type:ContainerSlot
  - type: Appearance
  - type: ItemMapper
    sprite: _IS14/Structures/Furniture/DoubleBed.rsi
    containerWhitelist:
    - mattress_slot
    mapLayers:
      mattress_up:
        whitelist:
          tags:
          - IS14BunkMattress
  - type: BunkBedMattressStrapLink
  - type: Construction
    graph: IS14DoubleBed
    node: bunkUpper
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
  - type: Transform
    anchored: true
    noRot: true
  - type: Anchorable
  - type: Pullable

- type: entity
  parent: IS14BedDoubleUp
  id: IS14BedDoubleDown
  name: bunk bed (lower berth)
  description: Bottom bunk of a two-tier bed. Slightly softer than the floor. Needs a bunk mattress before anyone can lie on it.
  components:
  - type: Construction
    graph: IS14DoubleBed
    node: bunkLower
  - type: Sprite
    state: doublebed_down
    drawdepth: Objects
  - type: Damageable
    damageModifierSet: Inflatable
  - type: Strap
    enabled: false
    position: Down
    rotation: -90
    buckleOffset: "0,-0.1"
  - type: ItemMapper
    sprite: _IS14/Structures/Furniture/DoubleBed.rsi
    containerWhitelist:
    - mattress_slot
    mapLayers:
      mattress_down:
        whitelist:
          tags:
          - IS14BunkMattress
