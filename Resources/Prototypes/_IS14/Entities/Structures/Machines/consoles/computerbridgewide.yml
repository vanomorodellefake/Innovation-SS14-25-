

- type: entity
  parent: ComputerSurveillanceWirelessCameraMonitor
  id: IS14WideComputerRightCameraMonitor
  name: wireless camera monitor
  description: A wireless surveillance camera monitor. You're watching them. Maybe.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      sprite: _IS14/Structures/Machines/consoles/widebridge.rsi
      state: computerright
    - map: ["computerLayerKeyboard"]
      sprite: _IS14/Structures/Machines/consoles/widebridge.rsi
      state: animright-unshaded
    - map: ["computerLayerScreen"]
      sprite: _IS14/Structures/Machines/consoles/widebridge.rsi
      state: animright-unshaded
    - map: ["computerLayerKeys"]
      sprite: _IS14/Structures/Machines/consoles/widebridge.rsi
      state: animright-unshaded
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open



