# wide lockers

- type: entity
  id: IS14MedWideLocker
  parent: LockerBase
  components:
  - type: Sprite
    sprite: _IS14/Structures/Storage/wide_lockers.rsi
    noRot: true
    layers:
    - state: med_base
      map: ["enum.StorageVisualLayers.Base"]
    - state: med_closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: AccessReader
    access: [["Medical"]]
  - type: EntityStorageVisuals
    stateBaseClosed: med_base
    stateDoorOpen: med_opened
    stateDoorClosed: med_closed

