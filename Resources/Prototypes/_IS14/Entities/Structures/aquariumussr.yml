- type: entity
  id: Aquariumussr
  parent: BaseStructureDynamic
  name: aquarium
  description: aquarium and fish
  components:
  - type: Sprite
    sprite: _IS14/Structures/Decoration/aquariumussr.rsi
    state: aquariumussr
    offset: 0.5, 0.5
    noRot: false
    drawdepth: Mobs
  - type: Transform
    noRot: true
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,1.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MobMask
  - type: InteractionOutline
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: InteractionPopup
    interactSuccessString: comp-aquarium-knock
    messagePerceivedByOthers: comp-aquariumu-knock
    interactSuccessSound:
      path: /Audio/Effects/glass_knock.ogg
