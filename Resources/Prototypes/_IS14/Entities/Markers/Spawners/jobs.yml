# IS14 Edit - Spawn points for custom roles

# Cargo
- type: entity
  id: SpawnPointSeniorExpeditioner
  parent: SpawnPointJobBase
  name: seniorexpeditioner
  components:
  - type: SpawnPoint
    job_id: SeniorExpeditioner
  - type: Sprite
    layers:
      - state: green
      - state: salvagespecialist

